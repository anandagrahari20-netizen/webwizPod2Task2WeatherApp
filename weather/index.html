<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-200">
    <h2 class="text-2xl pt-2 font-bold text-blue-900 text-center bg-white w-1/2 mx-auto rounded-lg shadow-lg">
    Know the weather of your region!!
    </h2>

    <div class="flex  justify-center items-center h-screen">
       
        
        <div class="bg-white p-5 rounded-lg shadow-lg w-80">

            <h1 class="text-xl text-center mb-4 font-weight-bold text-blue-900 bg-blue-100">Weather Website</h1>

            <input id="cityInput" 
                type="text" 
                placeholder="Enter city name"
                class="border p-2 w-full mb-3"
            >

            <button onclick="getWeather()" class="bg-blue-500 text-white w-full p-2 mb-4 hover:bg-blue-600  hover:scale-105">
                Search
            </button>

            <div id="weatherBox" class="text-center hidden">
                <p id="cityName">City: </p>
                <p id="temp">Temperature: </p>
                <p id="condition">Condition: </p>
                <p id="humidity">Humidity: </p>
                <p id="wind">Wind: </p>
            </div>

            <p id = "errorMsg" class="text-red-500 text-center mt-3 hidden">
                City not found
            </p>

        </div>

    </div>
<script src="script.js"></script>
</body>
</html>
